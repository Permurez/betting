services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: streamlit run src/app.py --server.address=0.0.0.0

  worker:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: python scripts/run_worker.py
    restart: unless-stopped
