# Zrodla danych QuantBet – edytuj wedlug potrzeb

odds:
  # Darmowy tier: https://the-odds-api.com/ (klucz w .env jako ODDS_API_KEY)
  provider: the_odds_api
  sports:
    - esports_csgo
    - esports_lol
    - esports_dota2
  regions: eu
  markets: h2h
  odds_format: decimal

news:
  rss_feeds:
    - name: HLTV News
      url: https://www.hltv.org/rss/news
    - name: Dot Esports
      url: https://dotesports.com/feed

social:
  trend_queries:
    - "fame mma"
    - "ksw"
    - "prime show mma"
    - "clout mma"
    - "boxdel"
    - "wardega"

stats:
  pandascore:
    enabled: false
    games:
      - csgo

storage:
  cache_dir: data/cache

